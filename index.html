<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Marzano-Aligned Coaching Artifact Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 1.5rem; background: #f5f7fb; }
    header { margin-bottom: 1.5rem; }
    h1 { margin: 0 0 0.25rem; }
    .subtitle { color: #555; margin-bottom: 1rem; }
    .container { max-width: 960px; margin: 0 auto; background: #fff; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    label { font-weight: 600; display: block; margin-bottom: 0.5rem; }
    textarea { width: 100%; min-height: 180px; padding: 0.75rem; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; resize: vertical; }
    select { padding: 0.4rem; border-radius: 4px; border: 1px solid #ccc; }
    .row { margin-bottom: 1rem; }
    button { padding: 0.6rem 1.2rem; border-radius: 999px; border: none; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .actions { display: flex; gap: 0.75rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .secondary { background: #e5e7eb; color: #111827; }
    #output { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; border: 1px solid #e5e7eb; background: #f9fafb; }
    #output h2 { margin-top: 0; }
    .artifact-section { margin-bottom: 1rem; }
    .element-tag { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 999px; background: #eff6ff; color: #1d4ed8; font-size: 0.8rem; margin-right: 0.4rem; }
    .tip-list { margin: 0.4rem 0 0.4rem 1.2rem; }
    .script-block { white-space: pre-wrap; font-family: inherit; background: #111827; color: #f9fafb; padding: 0.75rem; border-radius: 6px; margin-top: 0.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Marzano-Aligned Coaching Artifact Generator</h1>
      <div class="subtitle">
        Paste observation notes → generate focused, standards-based feedback aligned to the Marzano framework.
      </div>
    </header>

    <div class="row">
      <label for="notes">Observation notes</label>
      <textarea id="notes" placeholder="Paste your classroom observation notes here..."></textarea>
    </div>

    <div class="row">
      <label for="stance">Coaching stance (optional)</label>
      <select id="stance">
        <option value="collaborative">Collaborative</option>
        <option value="directive">Directive</option>
        <option value="facilitative">Facilitative</option>
      </select>
    </div>

    <div class="actions">
      <button id="generateBtn">Generate coaching artifact</button>
      <button id="copyBtn" class="secondary" disabled>Copy HTML</button>
      <button id="printBtn" class="secondary" disabled>Print</button>
    </div>

    <div id="output" aria-live="polite">
      <!-- Coaching artifact appears here -->
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
